<!DOCTYPE html>
<html lang="gl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rol de Combate PRO - Xestión Institucional v21.0</title>
    <!-- Librarías vía CDN: Tailwind para o deseño e SheetJS para o Excel -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; text-align: left; }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; }
            .print-page { padding: 1cm; color: black !important; }
        }

        #loadingOverlay { position: fixed; inset: 0; background: #0f172a; z-index: 1000; display: flex; align-items: center; justify-content: center; flex-direction: column; color: white; transition: opacity 0.4s ease; }
        .input-edit { @apply w-full bg-blue-50 border border-blue-200 rounded-xl p-3 text-sm font-bold text-slate-900 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="overflow-x-hidden">

    <!-- Pantalla de Carga -->
    <div id="loadingOverlay">
        <div class="w-16 h-16 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
        <p class="mt-8 text-[12px] font-black uppercase tracking-[0.5em] text-blue-400 animate-pulse">Sincronizando Base de Datos...</p>
    </div>

    <div id="app" class="min-h-screen flex flex-col lg:flex-row no-print text-left">
        
        <!-- Sidebar -->
        <aside class="w-full lg:w-80 bg-[#0f172a] text-white flex flex-col lg:sticky lg:top-0 h-screen shadow-2xl z-50">
            <div class="p-8 border-b border-white/5 flex items-center gap-4">
                <div class="bg-blue-600 p-2.5 rounded-2xl shadow-lg shadow-blue-500/40">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04a11.357 11.357 0 00-1.573 7.853c.523 5.51 5.963 10.414 10.191 12.117a10.598 10.598 0 003.978 0c4.227-1.703 9.668-6.607 10.191-12.117a11.356 11.356 0 00-1.573-7.853z" stroke-width="2"/></svg>
                </div>
                <div>
                    <h1 class="text-sm font-black tracking-tighter leading-none uppercase italic">Rol de Combate</h1>
                    <p class="text-[9px] font-medium opacity-30 uppercase tracking-widest mt-1">Xestión Unificada v21.0</p>
                </div>
            </div>

            <div class="flex-1 overflow-y-auto p-6 space-y-8">
                <div>
                    <span class="text-[9px] font-black text-slate-500 uppercase tracking-widest block mb-4 px-2">Cursos</span>
                    <nav id="courseFilters" class="space-y-1.5"></nav>
                </div>

                <div class="pt-6 border-t border-white/5">
                    <span class="text-[9px] font-black text-slate-500 uppercase tracking-widest block mb-4 px-2">Accións</span>
                    <button onclick="syncData()" class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-xl text-[9px] font-black uppercase tracking-widest transition-all mb-4 shadow-lg flex items-center justify-center gap-2">
                        Actualizar Drive
                    </button>
                    
                    <label class="flex items-center gap-4 p-4 bg-white/5 border border-white/10 rounded-2xl hover:bg-blue-600/20 transition-all cursor-pointer group">
                        <div class="text-left">
                            <p class="text-xs font-bold leading-tight uppercase text-blue-400 text-left">Subir Excel Manual</p>
                            <p class="text-[8px] opacity-40 text-left">Arquivo .csv</p>
                        </div>
                        <input type="file" accept=".csv" class="hidden" id="csvFileInput">
                    </label>
                </div>
            </div>
            <div class="p-6 border-t border-white/5 text-center text-[10px] font-black uppercase text-slate-600 italic">Conexión Segura</div>
        </aside>

        <!-- Main View -->
        <main class="flex-1 flex flex-col min-w-0 bg-slate-50">
            <header class="bg-white/80 backdrop-blur-xl border-b border-slate-200 sticky top-0 z-40 p-6 flex flex-col xl:flex-row items-center justify-between gap-6">
                <div class="flex items-center gap-4 w-full xl:w-auto flex-1 max-w-5xl">
                    <div class="relative flex-1">
                        <input type="text" id="searchInput" oninput="handleSearch()" placeholder="Busca por nome, DNI ou calquera campo do Excel..." class="w-full pl-6 pr-6 py-4 bg-slate-100 border-2 border-transparent rounded-2xl focus:bg-white focus:border-blue-500/20 transition-all outline-none font-semibold text-sm">
                    </div>
                </div>
                
                <div class="flex items-center gap-4 no-print">
                    <div class="bg-white px-5 py-3 rounded-2xl border border-slate-200 shadow-sm flex flex-col items-center">
                        <span class="text-[8px] font-black text-slate-400 uppercase tracking-widest leading-none mb-1 text-center">Cadetes</span>
                        <span class="text-xl font-black text-slate-900 leading-none" id="counterDisplay">0</span>
                    </div>
                    <button onclick="window.print()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-4 rounded-2xl flex items-center gap-3 shadow-lg">
                        <span class="text-xs font-black uppercase tracking-widest">Imprimir</span>
                    </button>
                </div>
            </header>

            <div id="gridContainer" class="p-8 flex-1 overflow-auto animate-fade-in grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 2xl:grid-cols-4 gap-6">
                <!-- Tarxetas dinámicas -->
            </div>
        </main>
    </div>

    <!-- MODAL EXPEDIENTE (MOSTRA TODOS OS CAMPOS) -->
    <div id="modal" class="fixed inset-0 z-[100] hidden items-center justify-center p-4 lg:p-10 no-print">
        <div class="absolute inset-0 bg-slate-950/95 backdrop-blur-xl" onclick="closeProfile()"></div>
        <div class="relative bg-white w-full max-w-7xl rounded-[3rem] shadow-2xl overflow-hidden flex flex-col lg:flex-row h-[90vh] border border-white/20 text-left">
            
            <!-- Perfil Lateral do Modal -->
            <div class="bg-slate-950 w-full lg:w-96 p-10 text-white flex flex-col flex-shrink-0 relative overflow-hidden">
                <div class="absolute top-0 right-0 w-40 h-40 bg-blue-600/10 blur-3xl rounded-full -mr-20 -mt-20"></div>
                <div class="text-center relative z-10">
                    <div class="w-36 h-36 bg-white/5 rounded-[3rem] mx-auto flex items-center justify-center mb-8 border border-white/10 shadow-2xl">
                        <svg class="w-20 h-20 text-blue-400 opacity-60" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" stroke-width="1.5"/></svg>
                    </div>
                    <h2 id="modalName" class="text-2xl font-black uppercase leading-tight mb-2 text-center">--</h2>
                    <div id="modalBadge" class="inline-block px-5 py-2 bg-blue-600 rounded-full text-[10px] font-black uppercase tracking-widest shadow-xl text-center">--</div>
                </div>

                <div class="mt-12 space-y-4 flex-1 overflow-y-auto pr-2 hide-scrollbar text-left" id="modalSidebar">
                    <!-- Resumo lateral -->
                </div>

                <div class="mt-10 space-y-3">
                    <button id="btnEdit" onclick="toggleEditMode()" class="w-full py-5 bg-amber-500 hover:bg-amber-600 text-slate-950 rounded-3xl font-black text-[10px] uppercase tracking-widest transition-all flex items-center justify-center gap-3 shadow-xl">
                        <span id="txtBtnEdit">Modificar Datos</span>
                    </button>
                    <button onclick="closeProfile()" class="w-full py-5 bg-white/5 hover:bg-white/10 text-white rounded-3xl text-[10px] font-black uppercase tracking-widest transition-all">Pechar</button>
                </div>
            </div>

            <!-- Corpo do Expediente (DINÁMICO) -->
            <div class="flex-1 overflow-y-auto bg-[#f8fafc] p-10 lg:p-20 text-left">
                <div class="max-w-5xl mx-auto">
                    <div class="flex items-center gap-4 mb-12">
                        <h4 class="text-[12px] font-black text-blue-600 uppercase tracking-[0.3em]">Expediente Completo (Tódolos Campos)</h4>
                        <div class="h-px bg-blue-600/10 flex-1"></div>
                    </div>
                    <div id="fieldsGrid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6 text-left">
                        <!-- Aquí cárganse todas as columnas do Excel -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Script de Lóxica -->
    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSNtpB6_esSJ6zIOFZebrESmLM9xZF7xhTNaUJ0WgQ6qYCF9RkUqjAohSNWA8qaig/pub?output=csv";
        
        let db = []; 
        let filtered = []; 
        let query = "";
        let currentLevel = "TODOS";
        let activeIdx = null;
        let isEditing = false;

        window.onload = () => {
            syncData();
            drawFilters();
        };

        async function syncData() {
            document.getElementById('loadingOverlay').style.display = 'flex';
            try {
                const res = await fetch(CSV_URL);
                const csv = await res.text();
                const wb = XLSX.read(csv, { type: 'string' });
                const raw = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                
                // ORDE ALFABÉTICA POR APELIDO
                db = raw.sort((a, b) => {
                    const apeA = (a.Apellido || a.APELLIDO || "").toString().toUpperCase();
                    const apeB = (b.Apellido || b.APELLIDO || "").toString().toUpperCase();
                    return apeA.localeCompare(apeB);
                });
                
                updateView();
            } catch (err) {
                console.error(err);
                alert("Erro de conexión. Tenta subir o arquivo manualmente.");
            }
            setTimeout(() => document.getElementById('loadingOverlay').style.display = 'none', 600);
        }

        function updateView() {
            filtered = db.filter(item => {
                const searchStr = JSON.stringify(item).toLowerCase();
                const matchesSearch = searchStr.includes(query.toLowerCase());
                
                const anoVal = (item.Año || item.AÑO || "").toString().toUpperCase();
                const matchesLevel = currentLevel === "TODOS" || anoVal.includes(currentLevel.split(' ')[0].toUpperCase());
                
                return matchesSearch && matchesLevel;
            });

            renderGrid();
            document.getElementById('counterDisplay').innerText = filtered.length;
        }

        function renderGrid() {
            const container = document.getElementById('gridContainer');
            container.innerHTML = "";
            
            filtered.forEach((c, i) => {
                const card = document.createElement('div');
                card.onclick = () => openProfile(i);
                card.className = "bg-white p-7 rounded-[2.5rem] shadow-sm border border-slate-200 hover:shadow-2xl transition-all cursor-pointer group flex flex-col h-full text-left";
                
                const ape = (c.Apellido || c.APELLIDO || "S/D").toUpperCase();
                const nom = (c.Nombre || c.NOMBRE || "").toUpperCase();
                const dni = c.DNI || c.DOCUMENTO || "S/D";
                const ano = c.Año || c.AÑO || "S/D";

                card.innerHTML = `
                    <div class="flex justify-between items-start mb-6 text-left">
                        <div class="w-14 h-14 bg-slate-900 rounded-3xl flex items-center justify-center text-blue-400 group-hover:bg-blue-600 group-hover:text-white transition-all text-left">
                            <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" stroke-width="2"/></svg>
                        </div>
                        <span class="px-3 py-1 bg-slate-100 rounded-xl text-[10px] font-black uppercase text-slate-500">${ano}</span>
                    </div>
                    <h3 class="text-xl font-black text-slate-900 leading-tight uppercase mb-1 text-left">${ape}</h3>
                    <p class="text-slate-500 font-medium text-sm mb-8 text-left">${nom}</p>
                    <div class="mt-auto bg-slate-50 p-4 rounded-3xl border border-slate-100 font-mono text-[10px] text-left">
                        <p class="text-[7px] font-black text-slate-400 uppercase leading-none mb-1 text-left">Identificación</p>
                        <p class="font-bold text-slate-900 text-left">${dni}</p>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function drawFilters() {
            const nav = document.getElementById('courseFilters');
            const options = ["TODOS", "1er Año", "2do Año", "3er Año"];
            nav.innerHTML = "";
            options.forEach(opt => {
                const b = document.createElement('button');
                b.onclick = () => { currentLevel = opt; drawFilters(); updateView(); };
                b.className = `w-full flex items-center justify-between px-6 py-4 rounded-[1.5rem] transition-all ${currentLevel === opt ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-400 hover:bg-white/5'} text-left`;
                b.innerHTML = `<span class="text-[10px] font-black uppercase tracking-widest text-left">${opt}</span>`;
                nav.appendChild(b);
            });
        }

        function handleSearch() {
            query = document.getElementById('searchInput').value;
            updateView();
        }

        // --- EXPEDIENTE ---
        function openProfile(idx) {
            activeIdx = idx;
            isEditing = false;
            updateProfileUI();
            document.getElementById('modal').classList.replace('hidden', 'flex');
        }

        function updateProfileUI() {
            const c = filtered[activeIdx];
            const ape = (c.Apellido || c.APELLIDO || "S/D").toUpperCase();
            const nom = (c.Nombre || c.NOMBRE || "").toUpperCase();
            const ano = c.Año || c.AÑO || "S/D";

            document.getElementById('modalName').innerText = `${ape} ${nom}`;
            document.getElementById('modalBadge').innerText = ano;
            document.getElementById('txtBtnEdit').innerText = isEditing ? "Gardar Cambios" : "Modificar Legajo";
            
            const sidebar = document.getElementById('modalSidebar');
            sidebar.innerHTML = `
                <div class="bg-white/5 p-5 rounded-[1.5rem] border border-white/5 text-left">
                    <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest mb-1 text-left">DNI</p>
                    <p class="text-sm font-bold text-slate-200 truncate text-left">${c.DNI || c.DOCUMENTO || "-"}</p>
                </div>
                <div class="bg-white/5 p-5 rounded-[1.5rem] border border-white/5 text-left">
                    <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest mb-1 text-left">Localidade</p>
                    <p class="text-sm font-bold text-slate-200 truncate text-left">${c.Localidad || c.LOCALIDAD || "-"}</p>
                </div>
            `;

            const grid = document.getElementById('fieldsGrid');
            grid.innerHTML = "";
            
            // MAPEO TOTAL DE COLUMNAS DO EXCEL
            Object.entries(c).forEach(([clave, valor]) => {
                if(clave.startsWith('_')) return; 

                const box = document.createElement('div');
                box.className = "bg-white border border-slate-200 p-6 rounded-[2rem] text-left hover:border-blue-500/20 transition-all text-left";
                
                if(isEditing) {
                    box.innerHTML = `
                        <label class="block text-[9px] font-black text-slate-400 uppercase tracking-widest mb-2 text-left">${clave}</label>
                        <input type="text" value="${valor || ''}" onchange="updateItemValue('${clave}', this.value)" class="input-edit text-left">
                    `;
                } else {
                    box.innerHTML = `
                        <label class="block text-[9px] font-black text-slate-400 uppercase tracking-widest mb-2 text-left">${clave}</label>
                        <p class="font-bold text-slate-900 text-sm break-words leading-tight text-left">${valor || "-"}</p>
                    `;
                }
                grid.appendChild(box);
            });
        }

        function updateItemValue(key, val) {
            filtered[activeIdx][key] = val;
        }

        function toggleEditMode() {
            if (isEditing) {
                isEditing = false;
                updateView();
                showToast("Legajo actualizado na sesión");
            } else {
                isEditing = true;
            }
            updateProfileUI();
        }

        function closeProfile() {
            isEditing = false;
            document.getElementById('modal').classList.replace('hidden', 'flex');
            document.getElementById('modal').classList.add('hidden');
        }

        function showToast(msg) {
            const t = document.createElement('div');
            t.className = "fixed bottom-8 right-8 bg-slate-900 text-white px-6 py-4 rounded-2xl text-xs font-bold border-l-4 border-blue-500 animate-fade-in z-[200] text-left";
            t.innerText = `✅ ${msg}`;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        // --- SUBIDA MANUAL ---
        document.getElementById('csvFileInput').onchange = (e) => {
            const f = e.target.files[0];
            const r = new FileReader();
            r.onload = (evt) => {
                const wb = XLSX.read(evt.target.result, { type: 'binary' });
                db = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                updateView();
                showToast("Arquivo cargado correctamente");
            };
            r.readAsBinaryString(f);
        };
    </script>
</body>
</html>
