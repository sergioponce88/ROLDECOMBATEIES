<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rol de Combate PRO v22.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; text-align: left; }
        .card-dark { background: rgba(30, 41, 59, 0.5); border: 1px solid rgba(51, 65, 85, 1); transition: all 0.3s ease; }
        .card-dark:hover { border-color: #3b82f6; transform: translateY(-2px); background: rgba(30, 41, 59, 0.8); }
        .input-dark { background: #1e293b; border: 1px solid #334155; color: white; border-radius: 0.75rem; padding: 0.75rem 1rem; width: 100%; outline: none; }
        .input-dark:focus { border-color: #3b82f6; ring: 2px #3b82f6; }
        #loader { position: fixed; inset: 0; background: #0f172a; z-index: 1000; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        @media print { .no-print { display: none !important; } body { background: white; color: black; } }
    </style>
</head>
<body class="overflow-x-hidden text-left">

    <div id="loader">
        <div class="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
        <p class="mt-4 text-blue-400 font-bold uppercase tracking-widest text-xs">Sincronizando Base de Datos...</p>
    </div>

    <div class="min-h-screen flex flex-col lg:flex-row no-print">
        <aside class="w-full lg:w-72 bg-[#0f172a] border-r border-slate-800 p-6 flex flex-col lg:sticky lg:top-0 h-screen">
            <div class="flex items-center gap-3 mb-10">
                <div class="bg-blue-600 p-2 rounded-lg shadow-lg shadow-blue-500/20">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04a11.357 11.357 0 00-1.573 7.853c.523 5.51 5.963 10.414 10.191 12.117a10.598 10.598 0 003.978 0c4.227-1.703 9.668-6.607 10.191-12.117a11.356 11.356 0 00-1.573-7.853z" stroke-width="2"/></svg>
                </div>
                <h1 class="text-lg font-extrabold tracking-tighter uppercase italic">Rol de Combate <span class="text-blue-500 text-xs block not-italic font-medium">PRO v22.0</span></h1>
            </div>

            <nav id="courseFilters" class="space-y-2 flex-1"></nav>

            <div class="pt-6 border-t border-slate-800 space-y-3">
                <button onclick="fetchData()" class="w-full py-3 bg-slate-800 hover:bg-slate-700 rounded-xl text-[10px] font-bold uppercase tracking-widest transition-all">Sincronizar</button>
                <label class="block w-full py-3 bg-blue-600 hover:bg-blue-700 text-center rounded-xl text-[10px] font-bold uppercase tracking-widest cursor-pointer transition-all">
                    Cargar Manual
                    <input type="file" id="fileInput" accept=".csv, .xlsx" class="hidden">
                </label>
            </div>
            <div class="mt-4 text-[10px] text-slate-500 font-bold uppercase tracking-tighter flex justify-between">
                <span>Total: <span id="totalCount">0</span></span>
                <span>Vistos: <span id="filteredCount">0</span></span>
            </div>
        </aside>

        <main class="flex-1 p-6 lg:p-10 bg-[#0b1120]">
            <header class="mb-10 flex flex-col md:flex-row gap-4 items-center">
                <div class="relative flex-1 w-full">
                    <input type="text" id="searchInput" oninput="applyFilters()" placeholder="Buscar por nombre, DNI, localidad, sangre..." class="input-dark pl-12 w-full text-sm font-medium">
                    <svg class="w-5 h-5 absolute left-4 top-1/2 -translate-y-1/2 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-width="2"/></svg>
                </div>
                <button onclick="window.print()" class="px-6 py-3 bg-blue-600 rounded-xl font-bold text-xs uppercase tracking-widest hover:bg-blue-700 transition-all">Imprimir</button>
            </header>

            <div id="grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6 animate-pro"></div>
        </main>
    </div>

    <div id="modal" class="fixed inset-0 z-[100] hidden items-center justify-center p-4 lg:p-10 no-print">
        <div class="absolute inset-0 bg-slate-950/90 backdrop-blur-sm" onclick="closeModal()"></div>
        <div class="relative bg-slate-900 w-full max-w-6xl rounded-[2.5rem] shadow-2xl overflow-hidden flex flex-col lg:flex-row h-[85vh] border border-slate-700">
            <div class="bg-[#0f172a] lg:w-80 p-8 border-r border-slate-800 flex flex-col items-center">
                <div class="w-32 h-32 bg-slate-800 rounded-3xl flex items-center justify-center mb-6 border border-slate-700">
                    <svg class="w-16 h-16 text-blue-500 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" stroke-width="1.5"/></svg>
                </div>
                <h2 id="m-name" class="text-xl font-bold uppercase text-center mb-2">--</h2>
                <div id="m-badge" class="px-4 py-1 bg-blue-600 rounded-full text-[10px] font-bold uppercase tracking-widest mb-10">--</div>
                
                <div class="w-full space-y-4 mb-auto">
                    <div class="p-4 bg-slate-800/50 rounded-2xl border border-slate-700">
                        <p class="text-[8px] text-slate-500 font-bold uppercase mb-1">DNI</p>
                        <p id="m-dni" class="text-xs font-bold text-blue-400 tracking-widest">--</p>
                    </div>
                </div>

                <div class="w-full space-y-3 mt-6">
                    <button id="btnEdit" onclick="toggleEdit()" class="w-full py-4 bg-amber-500 text-slate-950 rounded-2xl font-black text-[10px] uppercase tracking-widest hover:bg-amber-600 transition-all">Modificar</button>
                    <button onclick="closeModal()" class="w-full py-4 bg-slate-800 text-white rounded-2xl font-bold text-[10px] uppercase tracking-widest hover:bg-slate-700 transition-all">Cerrar</button>
                </div>
            </div>
            <div class="flex-1 overflow-y-auto p-8 lg:p-12 bg-[#0b1120] hide-scroll">
                <div id="m-fields" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>
        </div>
    </div>

    <script>
        const DRIVE_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSNtpB6_esSJ6zIOFZebrESmLM9xZF7xhTNaUJ0WgQ6qYCF9RkUqjAohSNWA8qaig/pub?output=csv";
        let rawData = [];
        let filtered = [];
        let selCourse = "TODOS";
        let activeIdx = null;
        let isEdit = false;

        async function fetchData() {
            document.getElementById('loader').style.display = 'flex';
            try {
                const res = await fetch(DRIVE_URL);
                const text = await res.text();
                const wb = XLSX.read(text, { type: 'string' });
                const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                
                rawData = json.sort((a,b) => {
                    const key = Object.keys(a).find(k => k.toLowerCase().includes('apellido')) || "";
                    return String(a[key] || "").localeCompare(String(b[key] || ""));
                });
                
                applyFilters();
            } catch (e) { alert("Fallo de conexión. Cargue el archivo manualmente."); }
            document.getElementById('loader').style.display = 'none';
        }

        function applyFilters() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            filtered = rawData.filter(c => {
                const matchSearch = JSON.stringify(c).toLowerCase().includes(query);
                const cursoKey = Object.keys(c).find(k => k.toLowerCase().includes('curso') || k.toLowerCase().includes('año'));
                const matchCourse = selCourse === "TODOS" || String(c[cursoKey] || "").toUpperCase().includes(selCourse.split(' ')[0].toUpperCase());
                return matchSearch && matchCourse;
            });
            renderGrid();
        }

        function renderGrid() {
            const container = document.getElementById('grid');
            container.innerHTML = "";
            filtered.forEach((c, i) => {
                const apeKey = Object.keys(c).find(k => k.toLowerCase().includes('apellido')) || "";
                const nomKey = Object.keys(c).find(k => k.toLowerCase().includes('nombre')) || "";
                const dniKey = Object.keys(c).find(k => k.toLowerCase().includes('dni') || k.toLowerCase().includes('documento')) || "";
                const cursoKey = Object.keys(c).find(k => k.toLowerCase().includes('curso') || k.toLowerCase().includes('año')) || "";

                const card = document.createElement('div');
                card.onclick = () => openModal(i);
                card.className = "card-dark p-6 rounded-[2rem] cursor-pointer flex flex-col h-full";
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-6">
                        <div class="w-12 h-12 bg-slate-800 rounded-2xl flex items-center justify-center text-blue-500">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" stroke-width="2"/></svg>
                        </div>
                        <span class="text-[9px] font-bold text-slate-500 uppercase">${c[cursoKey] || "SIN CURSO"}</span>
                    </div>
                    <h3 class="text-base font-black uppercase mb-1">${c[apeKey] || "SIN APELLIDO"}</h3>
                    <p class="text-slate-400 text-xs font-semibold mb-6">${c[nomKey] || "SIN NOMBRE"}</p>
                    <div class="mt-auto pt-4 border-t border-slate-800 flex justify-between items-center">
                        <span class="text-[9px] text-slate-600 font-bold uppercase">DNI: ${c[dniKey] || "-"}</span>
                        <span class="text-[9px] text-blue-500 font-black uppercase tracking-tighter">Ver Expediente →</span>
                    </div>
                `;
                container.appendChild(card);
            });
            document.getElementById('totalCount').innerText = rawData.length;
            document.getElementById('filteredCount').innerText = filtered.length;
        }

        function openModal(i) {
            activeIdx = i; isEdit = false; updateModalUI();
            document.getElementById('modal').classList.replace('hidden', 'flex');
        }

        function updateModalUI() {
            const c = filtered[activeIdx];
            const apeKey = Object.keys(c).find(k => k.toLowerCase().includes('apellido')) || "";
            const nomKey = Object.keys(c).find(k => k.toLowerCase().includes('nombre')) || "";
            const dniKey = Object.keys(c).find(k => k.toLowerCase().includes('dni') || k.toLowerCase().includes('documento')) || "";
            const cursoKey = Object.keys(c).find(k => k.toLowerCase().includes('curso') || k.toLowerCase().includes('año')) || "";

            document.getElementById('m-name').innerText = `${c[apeKey] || ""} ${c[nomKey] || ""}`;
            document.getElementById('m-badge').innerText = c[cursoKey] || "S/D";
            document.getElementById('m-dni').innerText = c[dniKey] || "S/D";
            document.getElementById('btnEdit').innerText = isEdit ? "GUARDAR" : "MODIFICAR";

            const grid = document.getElementById('m-fields');
            grid.innerHTML = "";
            Object.entries(c).forEach(([k, v]) => {
                const box = document.createElement('div');
                box.className = "p-4 bg-slate-800/30 border border-slate-700 rounded-2xl";
                box.innerHTML = `<label class="block text-[8px] text-slate-500 font-bold uppercase mb-2">${k}</label>`;
                if(isEdit) {
                    const input = document.createElement('input');
                    input.className = "w-full bg-slate-900 border-none text-xs font-bold text-white focus:ring-0 p-0";
                    input.value = v || "";
                    input.onchange = (e) => { filtered[activeIdx][k] = e.target.value; };
                    box.appendChild(input);
                } else {
                    box.innerHTML += `<p class="text-xs font-bold text-slate-200 break-words leading-tight">${v || "-"}</p>`;
                }
                grid.appendChild(box);
            });
        }

        function toggleEdit() { isEdit = !isEdit; if(!isEdit) applyFilters(); updateModalUI(); }
        function closeModal() { document.getElementById('modal').classList.replace('flex', 'hidden'); }
        
        function renderFilters() {
            const c = ["TODOS", "1er Año", "2do Año", "3er Año"];
            const nav = document.getElementById('courseFilters');
            c.forEach(opt => {
                const b = document.createElement('button');
                b.onclick = () => { selCourse = opt; renderFilters(); applyFilters(); };
                b.className = `w-full px-4 py-3 rounded-xl text-[10px] font-bold uppercase text-left transition-all ${selCourse===opt ? 'bg-blue-600 text-white' : 'text-slate-500 hover:bg-slate-800'}`;
                b.innerText = opt;
                nav.appendChild(b);
            });
        }

        document.getElementById('fileInput').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (evt) => {
                const wb = XLSX.read(evt.target.result, { type: 'binary' });
                rawData = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                applyFilters();
            };
            reader.readAsBinaryString(e.target.files[0]);
        };

        window.onload = () => { renderFilters(); fetchData(); };
    </script>
</body>
</html>
